<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumo Bizurado Guarda Municipal</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* FAIXA TOPO */
.topbar {
  background: red;
  text-align: center;
  padding: 10px;
  font-weight: bold;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity:1;}
  50% {opacity:0.6;}
  100% {opacity:1;}
}

/* HERO */
.hero {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  padding: 40px;
}

.hero-text {
  flex: 1;
}

.hero img {
  width: 100%;
  max-width: 500px;
}

/* BOTÃO */
.btn {
  background: red;
  padding: 15px 25px;
  border-radius: 8px;
  display: inline-block;
  margin-top: 20px;
  color: white;
  text-decoration: none;
  animation: pisca 1s infinite;
}

@keyframes pisca {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}

/* CARROSSEL */
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px;
}

.carousel img {
  width: 260px;
  height: 460px;
  object-fit: cover;
  border-radius: 10px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #111;
  padding: 10px;
  border-radius: 8px;
  display: none;
}

</style>
</head>

<body>

<div class="topbar">
📍 Pessoas de <span id="cidade"></span> estão comprando agora
</div>

<section class="hero">
  <div class="hero-text">
    <h1>RESUMO BIZURADO GUARDA MUNICIPAL</h1>
    <p>Material completo + mapas mentais + legislação</p>

    <a href="https://chk.eduzz.com/8017Y2DA07" class="btn">
      GARANTIR POR R$47,00
    </a>
  </div>

  <img src="img/hero.jpg">
</section>

<h2 style="text-align:center;">🔥 Veja quem já foi aprovado</h2>

<div class="carousel">
  <img src="img/depo1.jpg">
  <img src="img/depo2.jpg">
  <img src="img/depo3.jpg">
</div>

<h2 style="text-align:center;">📚 Veja o material por dentro</h2>

<div class="carousel">
  <img src="img/mat1.jpg">
  <img src="img/mat2.jpg">
  <img src="img/mat3.jpg">
</div>

<div class="popup" id="popup">
🔥 Alguém acabou de comprar
</div>

<script>
// FAKE LOCALIZAÇÃO
const cidades = ["São Paulo", "Porto Velho", "Manaus", "Rio de Janeiro"];
document.getElementById("cidade").innerText =
cidades[Math.floor(Math.random()*cidades.length)];

// POPUP COMPRA
setInterval(()=>{
  document.getElementById("popup").style.display = "block";
  setTimeout(()=>{
    document.getElementById("popup").style.display = "none";
  },3000);
},8000);
</script>

</body>
</html
