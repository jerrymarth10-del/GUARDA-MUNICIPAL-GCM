<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JR Apostilas | Guarda Municipal IDECAN 2026</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #18243a;
      --muted: #5f6f89;
      --line: #e6ebf3;
      --primary: #1f4da0;
      --primary-2: #315fbd;
      --gold: #f4c552;
      --shadow: 0 16px 50px rgba(22, 34, 60, 0.10);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(244,246,251,.92), rgba(244,246,251,.97)),
        url('https://images.unsplash.com/photo-1517260911205-8fcfd1749b74?auto=format&fit=crop&w=1600&q=80') center/cover fixed;
    }
    a { color: inherit; text-decoration: none; }
    .hidden { display: none !important; }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      width: min(460px, 100%);
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(49,95,189,.12), transparent 30%);
      pointer-events: none;
    }
    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #eef3ff;
      color: var(--primary);
      border: 1px solid #dbe6ff;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }
    .login-card h1 {
      margin: 0 0 8px;
      font-size: 44px;
      line-height: 1.02;
      position: relative;
      z-index: 1;
    }
    .login-card p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }
    .label {
      font-size: 14px;
      color: #31425f;
      margin: 6px 0;
      position: relative;
      z-index: 1;
    }
    .input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #dbe2ef;
      background: #fff;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .input:focus {
      border-color: #9bb6ef;
      box-shadow: 0 0 0 4px rgba(49,95,189,.10);
    }
    .btn {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(180deg, var(--primary-2), var(--primary));
      color: #fff;
      position: relative;
      z-index: 1;
    }
    .error {
      min-height: 18px;
      color: #d9534f;
      font-size: 13px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0,1fr);
      min-height: 100vh;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.90);
      backdrop-filter: blur(8px);
    }
    .logo {
      border: 1px solid #dfe7f4;
      border-radius: 26px;
      box-shadow: var(--shadow);
      background: linear-gradient(135deg, #ffffff, #f5f8ff);
      padding: 22px;
    }
    .logo .mini {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    .logo h2 {
      margin: 0;
      color: var(--primary);
      font-size: 32px;
    }
    .logo p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .menu {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    .menu button {
      width: 100%;
      text-align: left;
      border: 1px solid #e2e9f3;
      border-radius: 18px;
      background: #fff;
      color: var(--text);
      padding: 16px;
      cursor: pointer;
      font-size: 15px;
    }
    .menu button.active,
    .menu button:hover {
      background: linear-gradient(180deg, #eaf1ff, #dfeaff);
      border-color: #bfd2fb;
      color: var(--primary);
    }
    .side-box {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      padding: 16px;
    }
    .side-box h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .side-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .logout {
      margin-top: 16px;
      width: 100%;
      background: linear-gradient(180deg, var(--gold), #ebb836);
      color: #3a2a00;
    }

    .main { padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .topbar h1 { margin: 0 0 6px; font-size: 30px; }
    .topbar p { margin: 0; color: var(--muted); }
    .badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.88);
      font-size: 13px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .hero-card,
    .panel,
    .player,
    .content-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.94);
      box-shadow: var(--shadow);
    }
    .hero-main {
      padding: 30px;
      position: relative;
      overflow: hidden;
    }
    .hero-main::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -20px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(49,95,189,.12), transparent 68%);
    }
    .kicker {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef3ff;
      color: var(--primary);
      border: 1px solid #dbe6ff;
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .hero-main h2 {
      margin: 0 0 10px;
      font-size: 46px;
      line-height: 1.02;
    }
    .hero-main p {
      margin: 0;
      color: #465876;
      line-height: 1.7;
      font-size: 17px;
    }
    .hero-side { padding: 22px; }
    .hero-side h3 { margin: 0 0 12px; font-size: 20px; }
    .hero-side ul { margin: 0; padding-left: 18px; display: grid; gap: 10px; color: #415370; }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .panel { padding: 22px; }
    .stat strong {
      display: block;
      font-size: 34px;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin: 10px 0 16px;
    }
    .section-head h2 { margin: 0 0 6px; font-size: 30px; }
    .section-head p { margin: 0; color: var(--muted); }

    .player { overflow: hidden; margin-bottom: 18px; }
    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }
    .player-title { font-size: 18px; font-weight: 800; }
    .player-sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .player-view { position: relative; width: 100%; padding-top: 56.25%; background: #dfe7f4; }
    .player-view iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 16px;
    }
    .content-card { overflow: hidden; }
    .content-card .body { padding: 18px; }
    .content-card h3 { margin: 0 0 8px; font-size: 18px; }
    .content-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      min-height: 52px;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; padding: 0 18px 18px; }
