<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR Apostilas | IDECAN 2026</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#fff;
color:#000;
padding:30px;
border-radius:20px;
width:350px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.app{
display:none;
}

.sidebar{
width:260px;
background:#020617;
height:100vh;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#1e293b;
}

.main{
margin-left:280px;
padding:20px;
}

iframe{
width:100%;
height:300px;
margin-bottom:15px;
border-radius:10px;
}
</style>

</head>
<body>

<div class="login" id="login">
<div class="card">
<h2>JR Apostilas</h2>
<h1>IDECAN 2026</h1>

<input type="email" id="email" placeholder="Seu e-mail">
<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>
</div>

<div class="app" id="app">

<div class="sidebar">
<h2>JR Apostilas</h2>

<button onclick="abrir('portugues')">Português</button>
<button onclick="abrir('informatica')">Informática</button>
<button onclick="abrir('guarda')">Legislação</button>
<button onclick="abrir('questoes')">Questões</button>
<button onclick="abrir('rondonia')">Rondônia</button>
</div>

<div class="main" id="conteudo">
<h1>Bem-vindo</h1>
<p>Escolha um bloco no menu.</p>
</div>

</div>

<script>

const senhaCorreta = "idecan2026";

function entrar(){
let senha = document.getElementById("senha").value;

if(senha === senhaCorreta){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}else{
document.getElementById("erro").innerText="Senha incorreta";
}
}

function video(id){
return <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>;
}

function abrir(tipo){

let c = document.getElementById("conteudo");

// PORTUGUÊS
if(tipo==="portugues"){
c.innerHTML = `
<h1>Português IDECAN</h1>
${video("bpG4-S4eZcE")}
${video("AXqFZpNzJhE")}
${video("8tHpFX3gg1k")}
${video("FgPZdhOBGKM")}
${video("yfZcSF66c1E")}
${video("RyD9Q-0YJw0")}
${video("GcOghI163bg")}
${video("MkQ6bh7O2ew")}
${video("CcjYrgjZ0Qs")}
`;
}

// INFORMÁTICA
if(tipo==="informatica"){
c.innerHTML = `
<h1>Informática</h1>
${video("XdOeb5a_mjA")}
${video("0KfmdxVg9FQ")}
${video("TOVb7P7ieHQ")}
${video("jO-6OwZJI7I")}
${video("HbL09BFEwQs")}
${video("MDzdjeO9oas")}
${video("Dq3Uw0zHjaI")}
`;
}

// LEGISLAÇÃO + PDFs
if(tipo==="guarda"){
c.innerHTML = `
<h1>Legislação Guarda Municipal</h1>
${video("0d80mBEcamk")}
${video("bzhsFsDfHiU")}
${video("AaqrylnyWUw")}
${video("Xi2PR-HE_Io")}
${video("t9lBSr6K0cU")}
${video("IkkeWP_EqW0")}

<h2>PDFs</h2>
<iframe src="assets/pdfs/PDF-1.pdf"></iframe>
<iframe src="assets/pdfs/PDF-2.pdf"></iframe>
<iframe src="assets/pdfs/PDF-3.pdf"></iframe>
`;
}

// QUESTÕES
if(tipo==="questoes"){
c.innerHTML = `
<h1>Questões Comentadas</h1>
${video("t9lBSr6K0cU")}
${video("XEquTr_ay1o")}
${video("hCQ0_6CZoPc")}
${video("R2oJ-DxAufk")}
${video("FgPZdhOBGKM")}
${video("AXqFZpNzJhE")}
${video("8tHpFX3gg1k")}
${video("MkQ6bh7O2ew")}
`;
}

// RONDÔNIA
if(tipo==="rondonia"){
c.innerHTML = `
<h1>História e Geografia de Rondônia</h1>
${video("_czExbWgLiA")}
${video("OQNZd6bT-h8")}
${video("npC4q0fP4PI")}
${video("5hXfdHymGlE")}
${video("zpTpZ3NpFic")}
`;
}

}

</script>

</body>
</html
